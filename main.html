<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Notebook</title>
    <link rel="stylesheet" href="styles.css?v=3">
    <style>
        .logout-btn {
            width: 90%;
            margin: 20px auto;
            padding: 10px;
            background-color: #ff4757;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .logout-btn:hover { background-color: #ff6b81; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h2>My Digital Notebook</h2>
        <button class="logout-btn" id="logoutBtn">Logout 🚪</button>
        
        <ul class="notebook-list" id="notebookList">
            <li><button class="notebook-btn active" data-notebook="personal">Personal 📝</button></li>
            <li><button class="notebook-btn" data-notebook="work">Work 💼</button></li>
            <li><button class="notebook-btn" data-notebook="ideas">Ideas 💡</button></li>
        </ul>
    </aside>

    <section class="notes-list-panel">
        <div class="panel-header">
            <h3 id="currentNotebookTitle">Personal</h3>
            <button class="add-note-btn" id="newNoteBtn">+ New</button>
        </div>
        <div class="notes-container" id="notesContainer"></div>
    </section>

    <main class="editor-container">
        <div class="editor-actions">
            <div class="editor-header">
                <input type="text" class="note-title-input" id="noteTitle" placeholder="Note Title">
            </div>
            <div class="button-group">
                <button class="delete-note-btn" id="deleteNoteBtn">Delete Note</button>
                <button class="manual-save-btn" id="manualSaveBtn">Save Changes</button>
            </div>
        </div>
        <textarea class="note-textarea" id="noteContent" placeholder="Start writing your thoughts here..."></textarea>
    </main>

    <div class="modal-overlay" id="deleteModal">
        <div class="modal-box">
            <h3>Delete this note?</h3>
            <p>Are you sure you want to permanently delete this note?</p>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-cancel" id="modalCancelBtn">Cancel</button>
                <button class="modal-btn modal-btn-confirm" id="modalConfirmBtn">Delete</button>
            </div>
        </div>
    </div>

    <script>
        const uid = localStorage.getItem('uid');
        if (!uid) { window.location.href = 'draft2.html'; }
        
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('uid');
            window.location.href = 'draft2.html';
        });

        const API_URL = `http://127.0.0.1:5000/api/notes?user_id=${uid}`;       
        let notebookData = { personal: [], work: [], ideas: [] };
        let currentNotebook = "personal";
        let activeNoteId = null;
        let isSaving = false;

        const notebookList = document.getElementById('notebookList');
        const notesContainer = document.getElementById('notesContainer');
        const currentNotebookTitle = document.getElementById('currentNotebookTitle');
        const noteTitle = document.getElementById('noteTitle');
        const noteContent = document.getElementById('noteContent');
        const newNoteBtn = document.getElementById('newNoteBtn');
        const deleteNoteBtn = document.getElementById('deleteNoteBtn');
        const manualSaveBtn = document.getElementById('manualSaveBtn');
        const deleteModal = document.getElementById('deleteModal');
        const modalCancelBtn = document.getElementById('modalCancelBtn');
        const modalConfirmBtn = document.getElementById('modalConfirmBtn');

        async function fetchNotesFromBackend() {
            try {
                const response = await fetch(API_URL);
                if (response.ok) {
                    notebookData = await response.json();
                }
                renderNotesList();
            } catch (error) { renderNotesList(); }
        }

        async function saveNotesToBackend() {
            if (isSaving) return;
            isSaving = true;
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(notebookData)
                });
            } catch (error) { console.error("Save failed:", error); }
            finally { isSaving = false; }
        }

        manualSaveBtn.addEventListener('click', async () => {
            const note = notebookData[currentNotebook].find(n => n.id === activeNoteId);
            if (note) {
                note.title = noteTitle.value;
                note.content = noteContent.value;
            }
            manualSaveBtn.innerText = "Saving...";
            manualSaveBtn.disabled = true;
            await saveNotesToBackend();
            manualSaveBtn.innerText = "Saved! ✓";
            setTimeout(() => {
                manualSaveBtn.innerText = "Save Changes";
                manualSaveBtn.disabled = false;
                renderNotesList();
            }, 1500);
        });

        function renderNotesList() {
            notesContainer.innerHTML = ""; 
            const notes = notebookData[currentNotebook] || [];
            notes.forEach((note) => {
                const noteItem = document.createElement('div');
                noteItem.classList.add('note-item');
                if (note.id === activeNoteId) noteItem.classList.add('active');
                noteItem.dataset.id = note.id;
                noteItem.innerHTML = `<h4>${note.title || "Untitled"}</h4><p>${note.content || "..."}</p>`;
                notesContainer.appendChild(noteItem);
            });
            loadActiveNoteIntoEditor();
        }

        function loadActiveNoteIntoEditor() {
            const activeNote = (notebookData[currentNotebook] || []).find(n => n.id === activeNoteId);
            if (activeNote) {
                noteTitle.value = activeNote.title;
                noteContent.value = activeNote.content;
                deleteNoteBtn.style.display = "block";
            } else {
                noteTitle.value = ""; 
                noteContent.value = "";
                deleteNoteBtn.style.display = "none";
            }
        }

        notebookList.addEventListener('click', (e) => {
            const btn = e.target.closest('.notebook-btn');
            if (!btn) return;
            document.querySelectorAll('.notebook-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentNotebook = btn.dataset.notebook;
            currentNotebookTitle.innerText = btn.innerText.split(' ')[0];
            activeNoteId = null; 
            renderNotesList();
        });

        notesContainer.addEventListener('click', (e) => {
            const item = e.target.closest('.note-item');
            if (!item) return;
            activeNoteId = parseInt(item.dataset.id);
            renderNotesList();
        });

        newNoteBtn.addEventListener('click', async () => {
            const newNote = { id: Date.now(), title: "Untitled Note", content: "" };
            if (!notebookData[currentNotebook]) notebookData[currentNotebook] = [];
            notebookData[currentNotebook].unshift(newNote);
            activeNoteId = newNote.id;
            
            // Auto-save immediately upon creation
            await saveNotesToBackend(); 
            renderNotesList();
        });

        modalConfirmBtn.addEventListener('click', () => {
            notebookData[currentNotebook] = notebookData[currentNotebook].filter(n => n.id !== activeNoteId);
            activeNoteId = null;
            deleteModal.classList.remove('show'); 
            saveNotesToBackend();
            renderNotesList();
        });

        modalCancelBtn.addEventListener('click', () => deleteModal.classList.remove('show'));
        deleteNoteBtn.addEventListener('click', () => deleteModal.classList.add('show'));

        fetchNotesFromBackend();
    </script>
</body>
</html>
